<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>8two Apparel – Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <div class="brand">
    <img src="/logo.png" alt="8two Apparel logo">
    <span>8two Apparel – Admin</span>
  </div>
  <form method="POST" action="/api/logout">
    <button type="submit" class="btn btn-outline" style="font-size: 0.85rem;">Log Out</button>
  </form>
</header>

<main>
  <h1>Admin – Products</h1>

  <section class="card" style="margin-bottom: 1.5rem;">
    <h2>Add New Item</h2>
    <div style="display:grid;gap:0.75rem;max-width:480px;">
      <div>
        <label for="orgSelect">Organization</label>
        <select id="orgSelect"></select>
      </div>
      <div>
        <label for="itemName">Item name</label>
        <input id="itemName" type="text">
      </div>
      <div>
        <label for="itemDescription">Description</label>
        <input id="itemDescription" type="text">
      </div>
      <div>
        <label for="itemPrice">Base price</label>
        <input id="itemPrice" type="number" step="0.01">
      </div>
      <div>
        <label for="itemImageUrl">Image URL (for now)</label>
        <input id="itemImageUrl" type="text">
      </div>
      <div>
        <label><input type="checkbox" id="allowName"> Allow custom name</label>
      </div>
      <div>
        <label><input type="checkbox" id="allowNumber"> Allow custom number</label>
      </div>
      <button class="btn btn-primary" id="createItemBtn" type="button">Create Item</button>
      <p id="adminStatus" style="font-size:0.9rem;color:#6b7280;"></p>
    </div>
  </section>

  <section class="card">
    <h2>Existing Items</h2>
    <div id="itemsList" style="font-size:0.9rem;"></div>
  </section>
</main>

<script>
// Load orgs into dropdown
async function loadOrganizations() {
  try {
    const res = await fetch('/api/admin/organizations');
    if (!res.ok) throw new Error();
    const orgs = await res.json();
    const sel = document.getElementById('orgSelect');
    sel.innerHTML = '';
    orgs.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.id;
      opt.textContent = o.name;
      sel.appendChild(opt);
    });
  } catch (e) {
    document.getElementById('adminStatus').textContent =
      'Failed to load organizations (are you logged in as admin?)';
  }
}

// Load items list
async function loadItems() {
  const list = document.getElementById('itemsList');
  try {
    const res = await fetch('/api/admin/items');
    if (!res.ok) throw new Error();
    const items = await res.json();
    if (!items.length) {
      list.textContent = 'No items yet.';
      return;
    }
    list.innerHTML = '';
    let currentOrg = null;
    items.forEach(item => {
      if (item.organization_name !== currentOrg) {
        currentOrg = item.organization_name;
        const h3 = document.createElement('h3');
        h3.textContent = currentOrg;
        list.appendChild(h3);
      }
      const div = document.createElement('div');
      div.textContent = `#${item.id} – ${item.name} ($${item.base_price})`;
      list.appendChild(div);
    });
  } catch (e) {
    list.textContent = 'Failed to load items.';
  }
}

// Handle Create Item button
document.getElementById('createItemBtn').addEventListener('click', async () => {
  const orgId = document.getElementById('orgSelect').value;
  const name = document.getElementById('itemName').value.trim();
  const description = document.getElementById('itemDescription').value.trim();
  const price = parseFloat(document.getElementById('itemPrice').value);
  const imageUrl = document.getElementById('itemImageUrl').value.trim();
  const allowName = document.getElementById('allowName').checked;
  const allowNumber = document.getElementById('allowNumber').checked;
  const statusEl = document.getElementById('adminStatus');

  if (!orgId || !name || isNaN(price)) {
    statusEl.textContent = 'Organization, name and price are required.';
    return;
  }

  statusEl.textContent = 'Creating item...';

  try {
    const res = await fetch('/api/admin/items', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        organization_id: orgId,
        name,
        description,
        base_price: price,
        image_url: imageUrl,
        allow_name: allowName,
        allow_number: allowNumber
      })
    });

    if (!res.ok) throw new Error();
    const data = await res.json();
    statusEl.textContent = `Item created with ID ${data.id}. (Sizes can be added later.)`;

    document.getElementById('itemName').value = '';
    document.getElementById('itemDescription').value = '';
    document.getElementById('itemPrice').value = '';
    document.getElementById('itemImageUrl').value = '';
    document.getElementById('allowName').checked = false;
    document.getElementById('allowNumber').checked = false;

    loadItems();
  } catch (e) {
    statusEl.textContent = 'Failed to create item.';
  }
});

// Initial load
loadOrganizations();
loadItems();
</script>
</body>
</html>
