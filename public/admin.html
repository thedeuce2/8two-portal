<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>8two Apparel – Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="header">
  <div class="logo-container">
    <img src="logo.jpg" alt="8two Apparel" class="logo">
  </div>
  <div class="header-info">
    <h1>8two Apparel – Admin</h1>
  </div>
  <nav style="display:flex;align-items:center;gap:0.5rem;">
    <a href="/profile.html" class="btn btn-secondary" style="font-size:0.85rem;">Profile</a>
    <a href="/order.html" class="btn btn-secondary" style="font-size:0.85rem;">Order</a>
    <a href="/admin.html" id="adminNavLink" class="btn btn-secondary" style="font-size:0.85rem;">Admin</a>
    <form method="POST" action="/api/logout" style="margin-left:0.5rem;">
      <button type="submit" class="btn btn-secondary" style="font-size:0.85rem;">Log Out</button>
    </form>
  </nav>
</header>

<main>
  <h1>Admin – Products</h1>

  <!-- Add Organization -->
  <section class="card" style="margin-bottom: 1.5rem;">
    <h2>Add Organization</h2>
    <div style="display:grid;gap:0.75rem;max-width:480px;">
      <div>
        <label for="newOrgName">Organization name</label>
        <input id="newOrgName" type="text" placeholder="e.g. Eastview Soccer Club">
      </div>
      <div>
        <label for="newOrgDescription">Description (optional)</label>
        <input id="newOrgDescription" type="text" placeholder="Short description">
      </div>
      <button class="btn btn-primary" id="createOrgBtn" type="button">Create Organization</button>
    </div>
  </section>

  <!-- Manage Organizations -->
  <section class="card" style="margin-bottom: 1.5rem;">
    <h2>Manage Organizations</h2>
    <div id="orgList" style="font-size:0.9rem;"></div>
  </section>

  <!-- Add Item -->
  <section class="card" style="margin-bottom: 1.5rem;">
    <h2>Add New Item</h2>
    <div style="display:grid;gap:0.75rem;max-width:480px;">
      <div>
        <label for="orgSelect">Organization</label>
        <select id="orgSelect"></select>
      </div>
      <div>
        <label for="itemName">Item name</label>
        <input id="itemName" type="text">
      </div>
      <div>
        <label for="itemDescription">Description</label>
        <input id="itemDescription" type="text">
      </div>
      <div>
        <label for="itemPrice">Base price</label>
        <input id="itemPrice" type="number" step="0.01">
      </div>
      <div>
        <label for="itemImageFile">Item Image</label>
        <input id="itemImageFile" type="file" accept="image/*">
      </div>
      <div>
        <label><input type="checkbox" id="allowName"> Allow custom name</label>
      </div>
      <div>
        <label><input type="checkbox" id="allowNumber"> Allow custom number</label>
      </div>
      <button class="btn btn-primary" id="createItemBtn" type="button">Create Item</button>
      <p id="adminStatus" style="font-size:0.9rem;color:#6b7280;"></p>
    </div>
  </section>

  <!-- Existing Items -->
  <section class="card">
    <h2>Existing Items</h2>
    <div id="itemsList" style="font-size:0.9rem;"></div>
  </section>
</main>

<!-- Hide admin nav link for non-admins -->
<script>
(async function configureNav() {
  try {
    const res = await fetch('/api/check-auth');
    const data = await res.json();
    if (!data.authenticated) {
      window.location.href = '/';
      return;
    }
    const adminLink = document.getElementById('adminNavLink');
    if (adminLink && !data.user.is_admin) {
      adminLink.style.display = 'none';
    }
  } catch (e) {
    console.error('Nav auth check failed:', e);
    window.location.href = '/';
  }
})();
</script>

<script>
let orgCache = []; // for item editing

// Load orgs into dropdown and cache
async function loadOrganizations() {
  try {
    const res = await fetch('/api/admin/organizations');
    if (!res.ok) throw new Error();
    const orgs = await res.json();
    orgCache = orgs;

    const sel = document.getElementById('orgSelect');
    if (sel) {
      sel.innerHTML = '';

      if (!orgs.length) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'No organizations yet';
        sel.appendChild(opt);
      } else {
        orgs.forEach(o => {
          const opt = document.createElement('option');
          opt.value = o.id;
          opt.textContent = o.name;
          sel.appendChild(opt);
        });
      }
    }

    // Also load org list for deletion
    await loadOrgList();
  } catch (e) {
    const statusEl = document.getElementById('adminStatus');
    if (statusEl) {
      statusEl.textContent = 'Failed to load organizations (are you logged in?)';
    }
  }
}

// Show list of orgs with Delete buttons
async function loadOrgList() {
  const list = document.getElementById('orgList');
  if (!list) return;

  list.textContent = 'Loading organizations...';
  try {
    const res = await fetch('/api/admin/organizations');
    if (!res.ok) throw new Error();
    const orgs = await res.json();
    if (!orgs.length) {
      list.textContent = 'No organizations yet.';
      return;
    }
    list.innerHTML = '';
    orgs.forEach(org => {
      const row = document.createElement('div');
      row.style.display = 'flex';
      row.style.justifyContent = 'space-between';
      row.style.alignItems = 'center';
      row.style.padding = '0.3rem 0';
      row.style.borderBottom = '1px solid #e5e7eb';

      const info = document.createElement('div');
      info.textContent = `#${org.id} – ${org.name}`;

      const actions = document.createElement('div');
      const delBtn = document.createElement('button');
      delBtn.textContent = 'Delete Org';
      delBtn.style.cssText = 'font-size:0.8rem;color:#b91c1c;';
      delBtn.addEventListener('click', () => deleteOrg(org.id, org.name));

      actions.appendChild(delBtn);
      row.appendChild(info);
      row.appendChild(actions);
      list.appendChild(row);
    });
  } catch (e) {
    list.textContent = 'Failed to load organizations.';
  }
}

// Delete organization
async function deleteOrg(orgId, orgName) {
  const statusEl = document.getElementById('adminStatus');
  if (!confirm(`Delete organization "${orgName}" and ALL its items?`)) return;

  if (statusEl) statusEl.textContent = 'Deleting organization...';

  try {
    const res = await fetch(`/api/admin/organizations/${orgId}`, {
      method: 'DELETE'
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      if (statusEl) statusEl.textContent = data.error || 'Failed to delete organization.';
      return;
    }
    if (statusEl) statusEl.textContent = 'Organization deleted.';
    await loadOrganizations();
    await loadItems();
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Failed to delete organization.';
  }
}

// Load items list (grouped by org, with thumbnail + Edit/Delete)
async function loadItems() {
  const list = document.getElementById('itemsList');
  if (!list) return;

  list.textContent = 'Loading items...';
  try {
    const res = await fetch('/api/admin/items');
    if (!res.ok) throw new Error();
    const items = await res.json();
    if (!items.length) {
      list.textContent = 'No items yet.';
      return;
    }
    list.innerHTML = '';
    let currentOrg = null;
    items.forEach(item => {
      if (item.organization_name !== currentOrg) {
        currentOrg = item.organization_name;
        const h3 = document.createElement('h3');
        h3.textContent = currentOrg;
        h3.style.marginTop = '0.5rem';
        h3.style.marginBottom = '0.25rem';
        list.appendChild(h3);
      }
      const row = document.createElement('div');
      row.style.display = 'flex';
      row.style.justifyContent = 'space-between';
      row.style.alignItems = 'center';
      row.style.padding = '0.3rem 0';
      row.style.borderBottom = '1px solid #e5e7eb';
      row.dataset.itemId = item.id;

      // Info with thumbnail
      const info = document.createElement('div');
      info.style.display = 'flex';
      info.style.alignItems = 'center';
      info.style.gap = '0.5rem';

      const hasImage = item.image_url && item.image_url.trim() !== '';
      if (hasImage) {
        const img = document.createElement('img');
        img.src = item.image_url;
        img.alt = item.name;
        img.style.width = '48px';
        img.style.height = '48px';
        img.style.objectFit = 'cover';
        img.style.borderRadius = '6px';
        info.appendChild(img);
      } else {
        const placeholder = document.createElement('div');
        placeholder.style.width = '48px';
        placeholder.style.height = '48px';
        placeholder.style.borderRadius = '6px';
        placeholder.style.background = '#e5e7eb';
        info.appendChild(placeholder);
      }

      const textSpan = document.createElement('span');
      textSpan.textContent = `#${item.id} – ${item.name} ($${Number(item.base_price).toFixed(2)})`;
      info.appendChild(textSpan);

      const actions = document.createElement('div');

      const editBtn = document.createElement('button');
      editBtn.textContent = 'Edit';
      editBtn.style.cssText = 'font-size:0.8rem;margin-right:0.3rem;';
      editBtn.addEventListener('click', () => startEditItem(item, row));

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.style.cssText = 'font-size:0.8rem;color:#b91c1c;';
      deleteBtn.addEventListener('click', () => deleteItem(item.id));

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);
      row.appendChild(info);
      row.appendChild(actions);
      list.appendChild(row);
    });
  } catch (e) {
    list.textContent = 'Failed to load items.';
  }
}

// Turn a row into edit mode (items)
function startEditItem(item, row) {
  const statusEl = document.getElementById('adminStatus');
  row.innerHTML = '';

  // Org select
  const orgTd = document.createElement('div');
  const orgSelect = document.createElement('select');
  orgCache.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.id;
    opt.textContent = o.name;
    if (o.id === item.organization_id) opt.selected = true;
    orgSelect.appendChild(opt);
  });
  orgTd.appendChild(orgSelect);

  // Name
  const nameTd = document.createElement('div');
  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.value = item.name;
  nameInput.style.width = '140px';
  nameTd.appendChild(nameInput);

  // Price
  const priceTd = document.createElement('div');
  const priceInput = document.createElement('input');
  priceInput.type = 'number';
  priceInput.step = '0.01';
  priceInput.value = Number(item.base_price).toFixed(2);
  priceInput.style.width = '80px';
  priceTd.appendChild(priceInput);

  // Flags
  const flagsTd = document.createElement('div');
  const nameFlag = document.createElement('label');
  const nameChk = document.createElement('input');
  nameChk.type = 'checkbox';
  nameChk.checked = !!item.allow_name;
  nameFlag.appendChild(nameChk);
  nameFlag.appendChild(document.createTextNode(' Name'));
  nameFlag.style.marginRight = '0.5rem';

  const numFlag = document.createElement('label');
  const numChk = document.createElement('input');
  numChk.type = 'checkbox';
  numChk.checked = !!item.allow_number;
  numFlag.appendChild(numChk);
  numFlag.appendChild(document.createTextNode(' #'));

  flagsTd.appendChild(nameFlag);
  flagsTd.appendChild(numFlag);

  // Actions (Save / Cancel)
  const actionsTd = document.createElement('div');
  actionsTd.style.display = 'flex';
  actionsTd.style.gap = '0.25rem';

  const saveBtn = document.createElement('button');
  saveBtn.textContent = 'Save';
  saveBtn.className = 'btn btn-primary';
  saveBtn.style.fontSize = '0.8rem';
  saveBtn.addEventListener('click', async () => {
    if (statusEl) statusEl.textContent = 'Saving item...';
    const orgId = orgSelect.value;
    const newName = nameInput.value.trim();
    const newPrice = parseFloat(priceInput.value);
    const allowName = nameChk.checked;
    const allowNumber = numChk.checked;

    if (!orgId || !newName || isNaN(newPrice)) {
      if (statusEl) statusEl.textContent = 'Org, name, and price are required.';
      return;
    }

    try {
      const res = await fetch(`/api/admin/items/${item.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          organization_id: orgId,
          name: newName,
          description: item.description || '',
          base_price: newPrice,
          image_url: item.image_url || '',
          allow_name: allowName,
          allow_number: allowNumber
        })
      });
      if (!res.ok) throw new Error();
      if (statusEl) statusEl.textContent = 'Item updated.';
      loadItems();
    } catch (e) {
      if (statusEl) statusEl.textContent = 'Failed to update item.';
    }
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancel';
  cancelBtn.className = 'btn btn-secondary';
  cancelBtn.style.fontSize = '0.8rem';
  cancelBtn.addEventListener('click', () => {
    loadItems();
  });

  actionsTd.appendChild(saveBtn);
  actionsTd.appendChild(cancelBtn);

  row.style.display = 'flex';
  row.style.justifyContent = 'space-between';
  row.style.alignItems = 'center';
  row.style.padding = '0.3rem 0';
  row.style.borderBottom = '1px solid #e5e7eb';

  const left = document.createElement('div');
  left.style.display = 'flex';
  left.style.gap = '0.5rem';
  left.appendChild(orgTd);
  left.appendChild(nameTd);
  left.appendChild(priceTd);
  left.appendChild(flagsTd);

  row.appendChild(left);
  row.appendChild(actionsTd);
}

// Delete item
async function deleteItem(itemId) {
  const statusEl = document.getElementById('adminStatus');
  if (!confirm('Delete this item and all its size variants?')) return;

  if (statusEl) statusEl.textContent = 'Deleting item...';

  try {
    const res = await fetch(`/api/admin/items/${itemId}`, {
      method: 'DELETE'
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      if (statusEl) statusEl.textContent = data.error || 'Failed to delete item.';
      return;
    }
    if (statusEl) statusEl.textContent = 'Item deleted.';
    loadItems();
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Failed to delete item.';
  }
}

// Attach handlers after DOM is ready
document.addEventListener('DOMContentLoaded', () => {
  // Create organization
  const createOrgBtn = document.getElementById('createOrgBtn');
  if (createOrgBtn) {
    createOrgBtn.addEventListener('click', async () => {
      const nameInput = document.getElementById('newOrgName');
      const descInput = document.getElementById('newOrgDescription');
      const statusEl = document.getElementById('adminStatus');

      if (!nameInput || !descInput || !statusEl) return;

      const name = nameInput.value.trim();
      const description = descInput.value.trim();

      if (!name) {
        statusEl.textContent = 'Organization name is required.';
        return;
      }

      statusEl.textContent = 'Creating organization...';

      try {
        const res = await fetch('/api/admin/organizations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description })
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          statusEl.textContent = data.error || 'Failed to create organization.';
          return;
        }

        statusEl.textContent = 'Organization created.';
        nameInput.value = '';
        descInput.value = '';

        await loadOrganizations();
      } catch (e) {
        statusEl.textContent = 'Failed to create organization.';
      }
    });
  }

  // Create item
  const createItemBtn = document.getElementById('createItemBtn');
  if (createItemBtn) {
    createItemBtn.addEventListener('click', async () => {
      const orgSel = document.getElementById('orgSelect');
      const nameInput = document.getElementById('itemName');
      const descInput = document.getElementById('itemDescription');
      const priceInput = document.getElementById('itemPrice');
      const fileInput = document.getElementById('itemImageFile');
      const allowNameChk = document.getElementById('allowName');
      const allowNumberChk = document.getElementById('allowNumber');
      const statusEl = document.getElementById('adminStatus');

      if (!orgSel || !nameInput || !descInput || !priceInput || !statusEl) return;

      const orgId = orgSel.value;
      const name = nameInput.value.trim();
      const description = descInput.value.trim();
      const price = parseFloat(priceInput.value);
      const allowName = allowNameChk && allowNameChk.checked;
      const allowNumber = allowNumberChk && allowNumberChk.checked;

      if (!orgId || !name || isNaN(price)) {
        statusEl.textContent = 'Organization, name and price are required.';
        return;
      }

      statusEl.textContent = 'Uploading image (if provided)...';

      let imageUrl = '';

      if (fileInput && fileInput.files && fileInput.files[0]) {
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        try {
          const uploadRes = await fetch('/api/admin/upload-image', {
            method: 'POST',
            body: formData
          });
          if (!uploadRes.ok) throw new Error('Upload failed');
          const uploadData = await uploadRes.json();
          imageUrl = uploadData.image_url;
        } catch (e) {
          statusEl.textContent = 'Image upload failed. You can try again.';
          return;
        }
      }

      statusEl.textContent = 'Creating item...';

      try {
        const res = await fetch('/api/admin/items', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            organization_id: orgId,
            name,
            description,
            base_price: price,
            image_url: imageUrl,
            allow_name: allowName,
            allow_number: allowNumber
          })
        });

        if (!res.ok) throw new Error();
        const data = await res.json();
        statusEl.textContent = `Item created with ID ${data.id}.`;

        nameInput.value = '';
        descInput.value = '';
        priceInput.value = '';
        if (fileInput) fileInput.value = '';
        if (allowNameChk) allowNameChk.checked = false;
        if (allowNumberChk) allowNumberChk.checked = false;

        loadItems();
      } catch (e) {
        statusEl.textContent = 'Failed to create item.';
      }
    });
  }

  // Initial load
  loadOrganizations();
  loadItems();
});
</script>
</body>
</html>
