<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>8two Apparel – Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <div class="brand">
    <img src="/logo.png" alt="8two Apparel logo">
    <span>8two Apparel – Admin</span>
  </div>
  <form method="POST" action="/api/logout">
    <button type="submit" class="btn btn-outline" style="font-size: 0.85rem;">Log Out</button>
  </form>
</header>

<main>
  <h1>Admin – Products</h1>

  <!-- Add Organization -->
  <section class="card" style="margin-bottom: 1.5rem;">
    <h2>Add Organization</h2>
    <div style="display:grid;gap:0.75rem;max-width:480px;">
      <div>
        <label for="newOrgName">Organization name</label>
        <input id="newOrgName" type="text" placeholder="e.g. Eastview Soccer Club">
      </div>
      <div>
        <label for="newOrgDescription">Description (optional)</label>
        <input id="newOrgDescription" type="text" placeholder="Short description">
      </div>
      <button class="btn btn-primary" id="createOrgBtn" type="button">Create Organization</button>
    </div>
  </section>

  <!-- Add Item -->
  <section class="card" style="margin-bottom: 1.5rem;">
    <h2>Add New Item</h2>
    <div style="display:grid;gap:0.75rem;max-width:480px;">
      <div>
        <label for="orgSelect">Organization</label>
        <select id="orgSelect"></select>
      </div>
      <div>
        <label for="itemName">Item name</label>
        <input id="itemName" type="text">
      </div>
      <div>
        <label for="itemDescription">Description</label>
        <input id="itemDescription" type="text">
      </div>
      <div>
        <label for="itemPrice">Base price</label>
        <input id="itemPrice" type="number" step="0.01">
      </div>
      <div>
        <label for="itemImageFile">Item Image</label>
        <input id="itemImageFile" type="file" accept="image/*">
      </div>
      <div>
        <label><input type="checkbox" id="allowName"> Allow custom name</label>
      </div>
      <div>
        <label><input type="checkbox" id="allowNumber"> Allow custom number</label>
      </div>
      <button class="btn btn-primary" id="createItemBtn" type="button">Create Item</button>
      <p id="adminStatus" style="font-size:0.9rem;color:#6b7280;"></p>
    </div>
  </section>

  <!-- Existing Items -->
  <section class="card">
    <h2>Existing Items</h2>
    <div id="itemsList" style="font-size:0.9rem;"></div>
  </section>
</main>

<script>
// Load orgs into dropdown
async function loadOrganizations() {
  try {
    const res = await fetch('/api/admin/organizations');
    if (!res.ok) throw new Error();
    const orgs = await res.json();
    const sel = document.getElementById('orgSelect');
    sel.innerHTML = '';

    if (!orgs.length) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'No organizations yet';
      sel.appendChild(opt);
      return;
    }

    orgs.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.id;
      opt.textContent = o.name;
      sel.appendChild(opt);
    });
  } catch (e) {
    document.getElementById('adminStatus').textContent =
      'Failed to load organizations (are you logged in as admin?)';
  }
}

// Load items list (grouped by org, with Delete button)
async function loadItems() {
  const list = document.getElementById('itemsList');
  list.textContent = 'Loading items...';
  try {
    const res = await fetch('/api/admin/items');
    if (!res.ok) throw new Error();
    const items = await res.json();
    if (!items.length) {
      list.textContent = 'No items yet.';
      return;
    }
    list.innerHTML = '';
    let currentOrg = null;
    items.forEach(item => {
      if (item.organization_name !== currentOrg) {
        currentOrg = item.organization_name;
        const h3 = document.createElement('h3');
        h3.textContent = currentOrg;
        h3.style.marginTop = '0.5rem';
        h3.style.marginBottom = '0.25rem';
        list.appendChild(h3);
      }
      const row = document.createElement('div');
      row.style.display = 'flex';
      row.style.justifyContent = 'space-between';
      row.style.alignItems = 'center';
      row.style.padding = '0.3rem 0';
      row.style.borderBottom = '1px solid #e5e7eb';

      const info = document.createElement('div');
      info.textContent = `#${item.id} – ${item.name} ($${Number(item.base_price).toFixed(2)})`;

      const actions = document.createElement('div');

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.style.cssText = 'font-size:0.8rem;color:#b91c1c;';
      deleteBtn.addEventListener('click', () => deleteItem(item.id));

      actions.appendChild(deleteBtn);
      row.appendChild(info);
      row.appendChild(actions);
      list.appendChild(row);
    });
  } catch (e) {
    list.textContent = 'Failed to load items.';
  }
}

// Create organization
document.getElementById('createOrgBtn').addEventListener('click', async () => {
  const nameInput = document.getElementById('newOrgName');
  const descInput = document.getElementById('newOrgDescription');
  const statusEl = document.getElementById('adminStatus');

  const name = nameInput.value.trim();
  const description = descInput.value.trim();

  if (!name) {
    statusEl.textContent = 'Organization name is required.';
    return;
  }

  statusEl.textContent = 'Creating organization...';

  try {
    const res = await fetch('/api/admin/organizations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description })
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      statusEl.textContent = data.error || 'Failed to create organization.';
      return;
    }

    statusEl.textContent = 'Organization created.';
    nameInput.value = '';
    descInput.value = '';

    await loadOrganizations();
  } catch (e) {
    statusEl.textContent = 'Failed to create organization.';
  }
});

// Handle Create Item button
document.getElementById('createItemBtn').addEventListener('click', async () => {
  const orgId = document.getElementById('orgSelect').value;
  const name = document.getElementById('itemName').value.trim();
  const description = document.getElementById('itemDescription').value.trim();
  const price = parseFloat(document.getElementById('itemPrice').value);
  const fileInput = document.getElementById('itemImageFile');
  const allowName = document.getElementById('allowName').checked;
  const allowNumber = document.getElementById('allowNumber').checked;
  const statusEl = document.getElementById('adminStatus');

  if (!orgId || !name || isNaN(price)) {
    statusEl.textContent = 'Organization, name and price are required.';
    return;
  }

  statusEl.textContent = 'Uploading image (if provided)...';

  let imageUrl = '';

  if (fileInput.files && fileInput.files[0]) {
    const formData = new FormData();
    formData.append('image', fileInput.files[0]);

    try {
      const uploadRes = await fetch('/api/admin/upload-image', {
        method: 'POST',
        body: formData
      });
      if (!uploadRes.ok) throw new Error('Upload failed');
      const uploadData = await uploadRes.json();
      imageUrl = uploadData.image_url;
    } catch (e) {
      statusEl.textContent = 'Image upload failed. You can try again.';
      return;
    }
  }

  statusEl.textContent = 'Creating item...';

  try {
    const res = await fetch('/api/admin/items', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        organization_id: orgId,
        name,
        description,
        base_price: price,
        image_url: imageUrl,
        allow_name: allowName,
        allow_number: allowNumber
      })
    });

    if (!res.ok) throw new Error();
    const data = await res.json();
    statusEl.textContent = `Item created with ID ${data.id}.`;

    document.getElementById('itemName').value = '';
    document.getElementById('itemDescription').value = '';
    document.getElementById('itemPrice').value = '';
    fileInput.value = '';
    document.getElementById('allowName').checked = false;
    document.getElementById('allowNumber').checked = false;

    loadItems();
  } catch (e) {
    statusEl.textContent = 'Failed to create item.';
  }
});

// Delete item
async function deleteItem(itemId) {
  const statusEl = document.getElementById('adminStatus');
  if (!confirm('Delete this item and all its size variants?')) return;

  statusEl.textContent = 'Deleting item...';

  try {
    const res = await fetch(`/api/admin/items/${itemId}`, {
      method: 'DELETE'
    });
    if (!res.ok) {
      statusEl.textContent = 'Failed to delete item.';
      return;
    }
    statusEl.textContent = 'Item deleted.';
    loadItems();
  } catch (e) {
    statusEl.textContent = 'Failed to delete item.';
  }
}

// Initial load
loadOrganizations();
loadItems();
</script>
</body>
</html>
